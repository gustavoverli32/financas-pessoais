<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itaú | Cockpit Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-link { background-color: #ec7000; color: white !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .status-sim { background-color: #dcfce7; color: #166534; }
        .status-nao { background-color: #fee2e2; color: #991b1b; }
        .status-analise { background-color: #fef9c3; color: #854d0e; }
        /* Esconder scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-sans text-gray-700">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#003399] text-white flex flex-col shadow-2xl transition-transform duration-300 sidebar-closed md:relative md:translate-x-0">
        <div class="p-6 border-b border-blue-800 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-white text-[#003399] px-2 py-0.5 rounded text-sm">itau</span> Cockpit
            </h1>
            <button onclick="toggleMenu()" class="md:hidden text-2xl">✕</button>
        </div>
        
        <nav class="flex-1 p-4 space-y-1">
            <button onclick="showPage('dash')" id="link-dash" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition active-link">
                <span>📊</span> Home
            </button>
            <p class="text-[10px] uppercase text-blue-300 font-bold mt-6 mb-2 ml-2 tracking-widest">Gestão</p>
            <button onclick="showPage('equilibrio')" id="link-equilibrio" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition text-blue-100">
                <span>⚖️</span> Equilíbrio de Contas
            </button>
            <button onclick="showPage('config')" id="link-config" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition text-blue-100">
                <span>⚙️</span> Configurar Metas
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="toggleMenu()" class="md:hidden text-2xl p-1">☰</button>
                <h2 id="page-title" class="font-bold text-lg text-[#ec7000] truncate">Home</h2>
            </div>
            <button onclick="document.getElementById('excel-input').click()" class="bg-green-600 text-white text-[10px] font-bold px-3 py-2 rounded-lg hover:bg-green-700 transition uppercase">
                📂 <span class="hidden md:inline">Importar</span> Excel
            </button>
            <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls">
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar">
            
            <section id="page-dash" class="page-content active space-y-6">
                <div class="bg-gradient-to-r from-[#003399] to-blue-700 p-6 rounded-3xl text-white shadow-lg">
                    <h3 class="text-xl font-bold italic">Olá, Gustavo</h3>
                    <p class="text-blue-200 text-xs">Aqui está sua performance consolidada.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Equilíbrio de Contas</p>
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold">VENDIDO</p>
                                <p id="dash-eq-vendido" class="text-xl font-black text-gray-800">R$ 0,00</p>
                            </div>
                            <p id="dash-eq-perc" class="text-3xl font-black text-[#ec7000]">0%</p>
                        </div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div id="dash-eq-barra" class="bg-[#ec7000] h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <p id="dash-eq-meta" class="text-[10px] text-gray-400 mt-2 font-bold uppercase">Meta: R$ 0,00</p>
                    </div>
                </div>
            </section>

            <section id="page-equilibrio" class="page-content space-y-6">
                <button onclick="toggleForm()" class="md:hidden w-full bg-[#ec7000] text-white py-3 rounded-xl font-bold shadow-lg mb-4">
                    + Novo Lançamento
                </button>

                <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                    <div id="form-container" class="hidden md:block xl:col-span-1 bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4 text-gray-800 border-b pb-2">Lançamento</h4>
                        <form id="form-eq" class="space-y-3">
                            <input type="text" id="eq-cliente" placeholder="Cliente" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500" required>
                            <input type="text" id="eq-conta" placeholder="Ag/Conta" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500" required>
                            <select id="eq-modalidade" class="w-full p-3 border rounded-xl text-sm bg-white">
                                <option value="Crediário">Crediário</option>
                                <option value="LIS">LIS</option>
                                <option value="Consignado EP">Consignado EP</option>
                                <option value="Consignado OP">Consignado OP</option>
                                <option value="Consignado INSS">Consignado INSS</option>
                            </select>
                            <input type="text" id="eq-vendedor" placeholder="Vendedor" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500" required>
                            <input type="number" id="eq-valor" placeholder="Valor R$" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500" required>
                            <select id="eq-aprovado" class="w-full p-3 border rounded-xl text-sm font-bold text-orange-600 outline-none">
                                <option value="analise">⏳ Em Análise</option>
                                <option value="sim">✓ Aprovado</option>
                                <option value="nao">✕ Negado</option>
                            </select>
                            <button class="w-full bg-[#ec7000] text-white py-3 rounded-xl font-bold">Lançar no Sistema</button>
                        </form>
                    </div>

                    <div class="xl:col-span-3 space-y-3" id="lista-vendas">
                        </div>
                </div>
            </section>

            <section id="page-config" class="page-content">
                <div class="bg-white p-6 rounded-3xl border shadow-sm max-w-sm mx-auto">
                    <h3 class="font-bold mb-4 italic">Ajustar Metas</h3>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Equilíbrio (R$)</label>
                    <input type="number" id="cfg-meta-eq" class="w-full p-4 border rounded-2xl mt-1 mb-6 outline-none focus:border-orange-500 font-bold text-lg">
                    <button onclick="salvarConfig()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold">Salvar Meta do Trimestre</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        let dadosEq = JSON.parse(localStorage.getItem('itau_v_mobile')) || [];
        let metaEq = localStorage.getItem('itau_meta_v_mobile') || 500000;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('sidebar').classList.toggle('sidebar-open');
        }

        function toggleForm() {
            document.getElementById('form-container').classList.toggle('hidden');
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-link'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active-link');
            document.getElementById('page-title').innerText = id === 'dash' ? 'Home' : id.toUpperCase();
            if(window.innerWidth < 768) toggleMenu();
            render();
        }

        // Importação Excel
        document.getElementById('excel-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                rows.forEach(r => dadosEq.push({
                    id: Date.now() + Math.random(),
                    cliente: r.Nome || r.Cliente || "Importado",
                    conta: r.Conta || "S/N",
                    modalidade: r.Modalidade || "Crediário",
                    vendedor: r.Vendedor || "Equipe",
                    valor: parseFloat(r.Valor || 0),
                    aprovado: (r.Status || "analise").toLowerCase().includes('sim') ? 'sim' : 'analise'
                }));
                saveAndRender();
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function toggleStatus(id) {
            const idx = dadosEq.findIndex(d => d.id === id);
            const flow = ['analise', 'sim', 'nao'];
            dadosEq[idx].aprovado = flow[(flow.indexOf(dadosEq[idx].aprovado) + 1) % 3];
            saveAndRender();
        }

        function deleteRegistro(id) {
            if(confirm('Excluir?')) {
                dadosEq = dadosEq.filter(d => d.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('itau_v_mobile', JSON.stringify(dadosEq));
            render();
        }

        function render() {
            const aprovados = dadosEq.filter(d => d.aprovado === 'sim');
            const soma = aprovados.reduce((s, c) => s + c.valor, 0);
            const perc = Math.min((soma / metaEq) * 100, 100).toFixed(1);

            // Dashboard
            document.getElementById('dash-eq-vendido').innerText = soma.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('dash-eq-meta').innerText = `Meta: R$ ${parseFloat(metaEq).toLocaleString()}`;
            document.getElementById('dash-eq-perc').innerText = Math.round(perc) + '%';
            document.getElementById('dash-eq-barra').style.width = perc + '%';

            // Lista de Cards (Mobile Otimizado)
            const lista = document.getElementById('lista-vendas');
            if(dadosEq.length === 0) {
                lista.innerHTML = '<div class="text-center p-10 text-gray-400 italic">Nenhum dado lançado.</div>';
            } else {
                lista.innerHTML = dadosEq.map(d => `
                    <div class="bg-white p-4 rounded-2xl border-l-8 shadow-sm ${d.aprovado === 'sim' ? 'border-l-green-400' : d.aprovado === 'nao' ? 'border-l-red-400' : 'border-l-yellow-400'}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h5 class="font-bold text-gray-800 leading-tight">${d.cliente}</h5>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">${d.modalidade} • ${d.vendedor}</p>
                            </div>
                            <button onclick="deleteRegistro(${d.id})" class="text-gray-300 p-1">✕</button>
                        </div>
                        <div class="flex justify-between items-center mt-4">
                            <p class="font-black ${d.aprovado === 'sim' ? 'text-green-600' : 'text-gray-400'} text-lg">
                                R$ ${d.valor.toLocaleString()}
                            </p>
                            <button onclick="toggleStatus(${d.id})" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase border shadow-sm ${d.aprovado === 'sim' ? 'status-sim' : d.aprovado === 'nao' ? 'status-nao' : 'status-analise'}">
                                ${d.aprovado === 'sim' ? 'Aprovado' : d.aprovado === 'nao' ? 'Negado' : 'Em Análise'}
                            </button>
                        </div>
                    </div>
                `).reverse().join('');
            }
            document.getElementById('cfg-meta-eq').value = metaEq;
        }

        document.getElementById('form-eq').onsubmit = (e) => {
            e.preventDefault();
            dadosEq.push({
                id: Date.now(),
                cliente: document.getElementById('eq-cliente').value,
                conta: document.getElementById('eq-conta').value,
                modalidade: document.getElementById('eq-modalidade').value,
                vendedor: document.getElementById('eq-vendedor').value,
                valor: parseFloat(document.getElementById('eq-valor').value),
                aprovado: document.getElementById('eq-aprovado').value
            });
            e.target.reset();
            if(window.innerWidth < 768) toggleForm();
            saveAndRender();
        };

        function salvarConfig() {
            metaEq = document.getElementById('cfg-meta-eq').value;
            localStorage.setItem('itau_meta_v_mobile', metaEq);
            alert('Meta Atualizada!');
            render();
        }

        render();
    </script>
</body>
</html>
