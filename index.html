<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itaú | Cockpit de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-link { background-color: #ec7000; color: white !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        aside { transition: width 0.3s; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-[#003399] text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-blue-800">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-white text-[#003399] px-2 py-0.5 rounded text-sm">itau</span> Gestão
            </h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showPage('dash')" id="link-dash" class="w-full flex items-center gap-3 p-3 rounded-lg text-blue-100 hover:bg-blue-800 transition active-link">
                <span>📊</span> Dashboard Geral
            </button>
            <p class="text-[10px] uppercase text-blue-300 font-bold mt-4 mb-2 ml-2">Acompanhamentos</p>
            <button onclick="showPage('producao')" id="link-producao" class="w-full flex items-center gap-3 p-3 rounded-lg text-blue-100 hover:bg-blue-800 transition">
                <span>🚀</span> Lançar Produção
            </button>
            <button onclick="showPage('blocos')" id="link-blocos" class="w-full flex items-center gap-3 p-3 rounded-lg text-blue-100 hover:bg-blue-800 transition">
                <span>🧩</span> Visão por Blocos
            </button>
            <button onclick="showPage('metas')" id="link-metas" class="w-full flex items-center gap-3 p-3 rounded-lg text-blue-100 hover:bg-blue-800 transition">
                <span>⚙️</span> Ajustar Metas
            </button>
        </nav>

        <div class="p-4 border-t border-blue-800 text-[10px] text-blue-300 text-center">
            Logado como: Gestor Regional
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 id="page-title" class="font-bold text-gray-700 text-lg text-orange-600">Dashboard Geral</h2>
            <div class="text-sm text-gray-500">Trimestre Atual: <span class="font-bold">Q2 2026</span></div>
        </header>

        <div class="p-8">
            
            <section id="page-dash" class="page-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8" id="resumo-cards">
                    </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4">Top Performance (Mês)</h3>
                    <div class="space-y-4" id="ranking-lista">
                        </div>
                </div>
            </section>

            <section id="page-producao" class="page-content">
                <div class="max-w-xl bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold mb-6">Novo Registro</h3>
                    <form id="form-registro" class="space-y-4">
                        <input type="text" id="nome" placeholder="Nome do Colaborador" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                        <select id="bloco" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                            <option value="equilibrio">Equilíbrio de Contas</option>
                            <option value="produtos">Produtos</option>
                            <option value="renegociacao">Renegociação</option>
                            <option value="capitalizacao">Capitalização</option>
                            <option value="beneficios">Benefícios</option>
                            <option value="relacionamento">Relacionamento</option>
                        </select>
                        <input type="number" id="valor" placeholder="Valor/Quantidade" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                        <button class="w-full bg-[#ec7000] text-white py-3 rounded-xl font-bold">Confirmar</button>
                    </form>
                </div>
            </section>

            <section id="page-metas" class="page-content">
                <div class="bg-white p-6 rounded-2xl border max-w-2xl">
                    <h3 class="font-bold mb-4 italic">Definir Metas do Trimestre</h3>
                    <div id="inputs-metas" class="grid grid-cols-2 gap-4"></div>
                    <button onclick="salvarMetas()" class="mt-6 bg-gray-800 text-white px-8 py-2 rounded-lg">Salvar Configurações</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        const blocosInfo = [
            { id: 'equilibrio', nome: 'Equilíbrio' },
            { id: 'produtos', nome: 'Produtos' },
            { id: 'renegociacao', nome: 'Renegociação' },
            { id: 'capitalizacao', nome: 'Capitalização' },
            { id: 'beneficios', nome: 'Benefícios' },
            { id: 'relacionamento', nome: 'Relacionamento' }
        ];

        let metas = JSON.parse(localStorage.getItem('itau_metas')) || {
            equilibrio: 100, produtos: 100, renegociacao: 100, capitalizacao: 100, beneficios: 100, relacionamento: 100
        };

        let producao = JSON.parse(localStorage.getItem('itau_prod')) || [];

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-link'));
            
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active-link');
            
            const titles = { dash: 'Dashboard Geral', producao: 'Lançar Produção', metas: 'Configurar Metas', blocos: 'Visão por Blocos' };
            document.getElementById('page-title').innerText = titles[id];
            render();
        }

        function render() {
            // Cards do Dash
            const container = document.getElementById('resumo-cards');
            container.innerHTML = blocosInfo.map(b => {
                const total = producao.filter(p => p.bloco === b.id).reduce((s, c) => s + c.valor, 0);
                const perc = Math.min((total / metas[b.id]) * 100, 100).toFixed(0);
                return `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-xs font-bold text-gray-400 uppercase">${b.nome}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-2xl font-black text-gray-800">${total}</span>
                            <span class="text-xs font-bold px-2 py-1 rounded bg-orange-50 text-orange-600">${perc}% da meta</span>
                        </div>
                        <div class="w-full bg-gray-100 h-1.5 mt-4 rounded-full">
                            <div class="bg-orange-500 h-full rounded-full transition-all" style="width:${perc}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Inputs de Metas
            document.getElementById('inputs-metas').innerHTML = blocosInfo.map(b => `
                <div>
                    <label class="text-xs font-bold text-gray-500">${b.nome}</label>
                    <input id="in-${b.id}" type="number" value="${metas[b.id]}" class="w-full p-2 border rounded-lg">
                </div>
            `).join('');
        }

        function salvarMetas() {
            blocosInfo.forEach(b => metas[b.id] = document.getElementById('in-'+b.id).value);
            localStorage.setItem('itau_metas', JSON.stringify(metas));
            alert('Metas atualizadas!');
            render();
        }

        document.getElementById('form-registro').onsubmit = (e) => {
            e.preventDefault();
            producao.push({
                nome: document.getElementById('nome').value,
                bloco: document.getElementById('bloco').value,
                valor: parseFloat(document.getElementById('valor').value)
            });
            localStorage.setItem('itau_prod', JSON.stringify(producao));
            alert('Registrado!');
            e.target.reset();
            render();
        };

        render();
    </script>
</body>
</html>
