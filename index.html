<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itaú | Gestão de Equilíbrio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-link { background-color: #ec7000; color: white !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .status-sim { background-color: #dcfce7; color: #166534; }
        .status-nao { background-color: #fee2e2; color: #991b1b; }
        .badge-modalidade { background-color: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-sans text-gray-700">

    <aside class="w-64 bg-[#003399] text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-blue-800">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-white text-[#003399] px-2 py-0.5 rounded text-sm">itau</span> Cockpit
            </h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-1">
            <button onclick="showPage('dash')" id="link-dash" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-blue-800 transition active-link">
                <span>📊</span> Dashboard Geral
            </button>
            <p class="text-[10px] uppercase text-blue-300 font-bold mt-6 mb-2 ml-2">Gestão de Carteira</p>
            <button onclick="showPage('equilibrio')" id="link-equilibrio" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-blue-800 transition">
                <span>⚖️</span> Equilíbrio (Empréstimos)
            </button>
            <button onclick="showPage('config')" id="link-config" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-blue-800 transition">
                <span>⚙️</span> Configurar Metas
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="bg-white border-b p-4 flex justify-between items-center">
            <h2 id="page-title" class="font-bold text-lg text-[#ec7000]">Equilíbrio</h2>
            <div class="flex items-center gap-4 text-sm font-medium">
                Trimestre Atual: <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full">Q2 2026</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            
            <section id="page-equilibrio" class="page-content active">
                <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Total Aprovado (Equilíbrio)</p>
                            <h3 id="eq-soma-texto" class="text-3xl font-black text-gray-800">R$ 0,00</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400 font-bold">Meta: <span id="eq-meta-texto">R$ 0,00</span></p>
                            <p id="eq-perc-texto" class="text-2xl font-black text-[#ec7000]">0%</p>
                        </div>
                    </div>
                    <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                        <div id="eq-barra" class="bg-[#ec7000] h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                    <div class="xl:col-span-1 bg-white p-6 rounded-2xl shadow-sm border h-fit">
                        <h4 class="font-bold mb-4 text-gray-800 border-b pb-2">Novo Registro</h4>
                        <form id="form-eq" class="space-y-3 text-sm">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cliente</label>
                                <input type="text" id="eq-cliente" placeholder="Nome Completo" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500" required>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Agência / Conta</label>
                                <input type="text" id="eq-conta" placeholder="0000 / 00000-0" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500" required>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Modalidade</label>
                                <select id="eq-modalidade" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500 bg-white">
                                    <option value="Crediário">Crediário</option>
                                    <option value="LIS">LIS</option>
                                    <option value="Consignado EP">Consignado EP</option>
                                    <option value="Consignado OP">Consignado OP</option>
                                    <option value="Consignado INSS">Consignado INSS</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Estagiário / Vendedor</label>
                                <input type="text" id="eq-vendedor" placeholder="Nome do Responsável" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500" required>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Valor</label>
                                    <input type="number" id="eq-valor" placeholder="R$" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500" required>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Aprovado?</label>
                                    <select id="eq-aprovado" class="w-full p-2.5 border rounded-lg outline-none focus:border-orange-500 bg-white font-bold">
                                        <option value="sim">SIM</option>
                                        <option value="nao">NÃO</option>
                                    </select>
                                </div>
                            </div>
                            <button class="w-full bg-[#ec7000] text-white py-3 rounded-lg font-bold mt-4 hover:bg-orange-600 transition shadow-lg shadow-orange-200">
                                Registrar Contrato
                            </button>
                        </form>
                    </div>

                    <div class="xl:col-span-3 bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col">
                        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                            <h4 class="font-bold text-sm text-gray-600">Acompanhamento de Empréstimos</h4>
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Dados em tempo real</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead>
                                    <tr class="bg-white border-b text-gray-400 text-[11px] uppercase tracking-tighter">
                                        <th class="p-4 font-black">Cliente / Conta</th>
                                        <th class="p-4 font-black">Modalidade</th>
                                        <th class="p-4 font-black">Vendedor</th>
                                        <th class="p-4 font-black text-right">Valor</th>
                                        <th class="p-4 font-black text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="eq-tabela-body" class="divide-y divide-gray-100">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-dash" class="page-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="home-cards">
                    </div>
            </section>

            <section id="page-config" class="page-content">
                <div class="bg-white p-8 rounded-2xl border max-w-md shadow-sm">
                    <h3 class="font-bold text-lg mb-4 italic text-gray-700">Meta do Trimestre</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase">Meta Equilíbrio (R$)</label>
                            <input type="number" id="cfg-meta-eq" class="w-full p-3 border rounded-xl mt-1 outline-none focus:border-orange-500">
                        </div>
                        <button onclick="salvarConfig()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-black transition">Atualizar Planejamento</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // Dados Persistentes
        let dadosEq = JSON.parse(localStorage.getItem('itau_eq_v2')) || [];
        let metaEq = localStorage.getItem('itau_meta_eq_v2') || 250000;

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-link'));
            
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active-link');
            document.getElementById('page-title').innerText = id === 'dash' ? 'Dashboard Geral' : id.charAt(0).toUpperCase() + id.slice(1);
            render();
        }

        function render() {
            // Cálculos de Performance
            const aprovados = dadosEq.filter(d => d.aprovado === 'sim');
            const somaAprovados = aprovados.reduce((acc, curr) => acc + curr.valor, 0);
            const perc = Math.min((somaAprovados / metaEq) * 100, 100).toFixed(1);

            // Atualiza UI de Performance
            document.getElementById('eq-soma-texto').innerText = somaAprovados.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('eq-meta-texto').innerText = parseFloat(metaEq).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('eq-perc-texto').innerText = perc + '%';
            document.getElementById('eq-barra').style.width = perc + '%';

            // Renderizar Tabela de Equilíbrio
            const body = document.getElementById('eq-tabela-body');
            if(dadosEq.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-300 italic">Nenhum contrato registrado até o momento.</td></tr>';
            } else {
                body.innerHTML = dadosEq.map(d => `
                    <tr class="hover:bg-gray-50 transition border-l-4 ${d.aprovado === 'sim' ? 'border-l-green-400' : 'border-l-red-300'}">
                        <td class="p-4">
                            <div class="font-bold text-gray-800">${d.cliente}</div>
                            <div class="text-[10px] text-gray-400 font-mono tracking-tighter">${d.conta}</div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold badge-modalidade uppercase">${d.modalidade}</span>
                        </td>
                        <td class="p-4 text-gray-500 font-medium">${d.vendedor}</td>
                        <td class="p-4 text-right font-black ${d.aprovado === 'sim' ? 'text-green-600' : 'text-gray-300'}">
                            R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${d.aprovado === 'sim' ? 'status-sim' : 'status-nao'}">
                                ${d.aprovado === 'sim' ? '✓ APROVADO' : '✕ NEGADO'}
                            </span>
                        </td>
                    </tr>
                `).reverse().join('');
            }

            document.getElementById('cfg-meta-eq').value = metaEq;
        }

        // Evento de Submissão do Formulário
        document.getElementById('form-eq').onsubmit = (e) => {
            e.preventDefault();
            const registro = {
                cliente: document.getElementById('eq-cliente').value,
                conta: document.getElementById('eq-conta').value,
                modalidade: document.getElementById('eq-modalidade').value,
                vendedor: document.getElementById('eq-vendedor').value,
                valor: parseFloat(document.getElementById('eq-valor').value),
                aprovado: document.getElementById('eq-aprovado').value,
                timestamp: new Date().getTime()
            };
            
            dadosEq.push(registro);
            localStorage.setItem('itau_eq_v2', JSON.stringify(dadosEq));
            e.target.reset();
            render();
            alert('Contrato de ' + registro.modalidade + ' registrado com sucesso!');
        };

        function salvarConfig() {
            metaEq = document.getElementById('cfg-meta-eq').value;
            localStorage.setItem('itau_meta_eq_v2', metaEq);
            alert('Nova meta de R$ ' + metaEq + ' configurada para o Equilíbrio.');
            render();
        }

        // Inicialização
        render();
    </script>
</body>
</html>
